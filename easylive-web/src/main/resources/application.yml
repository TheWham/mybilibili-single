server:
  port: 7071
#  servlet:
#    context-path: /web
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  application:
    name: easylive-web
  ai:
    ollama:
      base-url: http://127.0.0.1:11434
      chat:
        options:
          model: qwen2.5:3b
          keep-alive: 10m
      embedding:
        options:
          # 本机 4GB 显存不足以同时常驻 qwen2.5:3b 和 bge-m3:567m。
          # 使用 CPU 专用别名，避免向量检索阶段把对话模型从显存中挤出去。
          model: bge-m3-cpu:567m
          keep-alive: 10m
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/easylive?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf8&autoReconnect=true&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: Xu13937698718
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: HikariCPDatasource
      minimum-idle: 5
      idle-timeout: 180000
      maximum-pool-size: 10
      auto-commit: true
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  data:
    redis:
      database: 0
      host: 127.0.0.1
      port: 6379
      jedis:
        pool:
          max-active: 20
          max-wait: -1
          max-idle: 10
          min-idle: 0
      timeout: 5000

#mybatis 大小写转驼峰
mybatis:
  configuration:
    map-underscore-to-camel-case: true

project:
  folder: d:/springbootworkspace/easylive-java/
es:
  host:
    port: 127.0.0.1:9201
  index:
    video:
      name: easylive_video
      subtitle:
        vector:
          name: easylive_video_subtitle_vector
ai:
  rag:
    min-score: 0.55
    default-top-k: 5
    max-top-k: 10
  warmup:
    enabled: true
log:
  root:
    level: debug
